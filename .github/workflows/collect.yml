name: OSINT Collect + Deploy

on:
  schedule:
    # Full OSINT collection: every 6 hours
    - cron: '0 0,6,12,18 * * *'
    # Flash brief template: Friday 4:00 PM MT
    - cron: '0 22 * * 5'
    # Flash brief template: Monday 7:30 AM MT
    - cron: '30 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml feedparser

      # ── Full OSINT collector (fleet, casualties, losses, posture, commanders, doomsday) ──
      - name: Run OSINT collector v2
        run: python collectors/collect_osint.py
        continue-on-error: true

      # ── COCOM RSS feeds ──
      - name: Collect CENTCOM
        run: python collectors/collect_centcom.py || true
      - name: Collect EUCOM
        run: python collectors/collect_eucom.py || true
      - name: Collect INDOPACOM
        run: python collectors/collect_indopacom.py || true
      - name: Collect AFRICOM
        run: python collectors/collect_africom.py || true
      - name: Collect STRATCOM
        run: python collectors/collect_stratcom.py || true
      - name: Merge feeds
        run: python collectors/merge_feeds.py || true

      # ── Flash brief (Fri/Mon only) ──
      - name: Generate flash brief template
        if: github.event.schedule == '0 22 * * 5' || github.event.schedule == '30 13 * * 1' || github.event_name == 'workflow_dispatch'
        run: python collectors/generate_flash.py || true

      # ── Commit everything ──
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/ site/reports/ || true
          git diff --cached --quiet || git commit -m "📡 OSINT $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

name: OSINT Collect + Deploy

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
    - cron: '0 22 * * 5'
    - cron: '30 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml feedparser
      - run: python collectors/collect_osint.py
        continue-on-error: true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/ || true
          git diff --cached --quiet || git commit -m "📡 OSINT $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

name: OSINT Collect + Deploy

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
    - cron: '0 22 * * 5'
    - cron: '30 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collectors/requirements.txt

      - name: Install dependencies
        run: pip install -r collectors/requirements.txt

      - name: Collect OSINT feeds
        run: python collectors/collect_osint.py
        continue-on-error: true

      - name: Collect CENTCOM
        run: cd collectors && python collect_centcom.py || true
        continue-on-error: true

      - name: Collect EUCOM
        run: cd collectors && python collect_eucom.py || true
        continue-on-error: true

      - name: Collect INDOPACOM
        run: cd collectors && python collect_indopacom.py || true
        continue-on-error: true

      - name: Collect AFRICOM
        run: cd collectors && python collect_africom.py || true
        continue-on-error: true

      - name: Collect STRATCOM
        run: cd collectors && python collect_stratcom.py || true
        continue-on-error: true

      - name: Merge feeds
        run: python collectors/merge_feeds.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/ || true
          git diff --cached --quiet || git commit -m "📡 OSINT $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

name: V3 OSINT Collect + Deploy

on:
  schedule:
    # Every 6 hours — main collection
    - cron: '0 0,6,12,18 * * *'
    # Friday 10pm UTC — weekly fleet tracker
    - cron: '0 22 * * 5'
    # Monday 1:30pm UTC — commander check
    - cron: '30 13 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Collector mode (all, cocom, osint, fleet, etc.)'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: v3/collectors/requirements.txt

      - name: Install dependencies
        run: pip install -r v3/collectors/requirements.txt

      - name: Run collectors
        run: python v3/collectors/run.py ${{ github.event.inputs.mode || 'all' }}
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v3/site/data/ || true
          git diff --cached --quiet || git commit -m "📡 V3 OSINT $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
